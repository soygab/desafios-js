<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caixa Eletrônico</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#2563eb;
    }

    .container{
      background:#fff;
      width:380px;
      padding:35px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      text-align:center;
    }

    h1{
      color:#2563eb;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      border:2px solid #cbd5e1;
      border-radius:10px;
      margin-bottom:15px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .resultado{
      margin-top:20px;
      background:#eff6ff;
      padding:15px;
      border-radius:10px;
      text-align:left;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Caixa Eletrônico</h1>

    <input type="number" id="valor" placeholder="Digite o valor">

    <button onclick="sacar()">Sacar</button>

    <div class="resultado" id="resultado"></div>

  </div>

  <script>

    function sacar(){

      let valor = Number(document.getElementById("valor").value);

      let notas100 = Math.floor(valor / 100);
      valor %= 100;

      let notas50 = Math.floor(valor / 50);
      valor %= 50;

      let notas20 = Math.floor(valor / 20);
      valor %= 20;

      let notas10 = Math.floor(valor / 10);
      valor %= 10;

      let notas5 = Math.floor(valor / 5);

      document.getElementById("resultado").innerHTML =
      `
        ${notas100 > 0 ? `<p>${notas100} nota(s) de 100</p>` : ""}
        ${notas50 > 0 ? `<p>${notas50} nota(s) de 50</p>` : ""}
        ${notas20 > 0 ? `<p>${notas20} nota(s) de 20</p>` : ""}
        ${notas10 > 0 ? `<p>${notas10} nota(s) de 10</p>` : ""}
        ${notas5 > 0 ? `<p>${notas5} nota(s) de 5</p>` : ""}
      `;

    }

  </script>

</body>
</html>
