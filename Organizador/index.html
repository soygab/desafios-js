<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizador de Números</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#2563eb;
    }

    .container{
      background:#fff;
      width:400px;
      padding:35px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
      color:#2563eb;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      border:2px solid #cbd5e1;
      border-radius:10px;
      margin-bottom:15px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    .resultado{
      margin-top:20px;
      background:#eff6ff;
      padding:15px;
      border-radius:10px;
      text-align:left;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Organizador</h1>

    <input type="text" id="numeros" placeholder="Ex: 5,2,9,1">

    <button onclick="organizar()">Organizar</button>

    <div class="resultado" id="resultado"></div>

  </div>

  <script>

    function organizar(){

      let numeros = document
      .getElementById("numeros")
      .value
      .split(",")
      .map(num => Number(num));

      let crescente = [...numeros].sort((a,b) => a-b);

      let decrescente = [...numeros].sort((a,b) => b-a);

      document.getElementById("resultado").innerHTML =
      `
        <p><strong>Crescente:</strong> ${crescente}</p>
        <p><strong>Decrescente:</strong> ${decrescente}</p>
      `;

    }

  </script>

</body>
</html>
