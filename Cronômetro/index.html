<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronômetro</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#2563eb;
    }

    .container{
      background:#fff;
      width:350px;
      padding:35px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
      color:#2563eb;
      margin-bottom:20px;
    }

    .tempo{
      font-size:50px;
      margin-bottom:25px;
      color:#111827;
    }

    button{
      padding:12px 18px;
      margin:5px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      cursor:pointer;
      font-weight:bold;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Cronômetro</h1>

    <div class="tempo" id="tempo">00:00</div>

    <button onclick="iniciar()">Iniciar</button>
    <button onclick="pausar()">Pausar</button>
    <button onclick="resetar()">Resetar</button>

  </div>

  <script>

    let segundos = 0;
    let intervalo;

    function atualizar(){

      let min = Math.floor(segundos / 60);
      let seg = segundos % 60;

      min = String(min).padStart(2, "0");
      seg = String(seg).padStart(2, "0");

      document.getElementById("tempo").innerHTML = `${min}:${seg}`;

    }

    function iniciar(){

      intervalo = setInterval(() => {

        segundos++;
        atualizar();

      }, 1000);

    }

    function pausar(){

      clearInterval(intervalo);

    }

    function resetar(){

      clearInterval(intervalo);

      segundos = 0;

      atualizar();

    }

  </script>

</body>
</html>
